<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아이템 신청하기 — 소개만</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
</head>
<body>

<div class="layout">

  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">소개만<span>.</span></div>
      <div class="role-badge" id="sidebar-role-badge">커넥터</div>
    </div>
    <div class="sidebar-user">
      <div class="user-name" id="sidebar-name">로딩 중...</div>
      <div class="user-company" id="sidebar-company"></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">메인</div>
      <a href="#" class="nav-item" id="nav-dash">
        <span class="nav-icon">🏠</span> 대시보드
      </a>
      <a href="marketplace.html" class="nav-item">
        <span class="nav-icon">🛍️</span> 아이템 탐색
      </a>
      <div class="nav-section-label">기타</div>
      <a href="item-request.html" class="nav-item active">
        <span class="nav-icon">🙋</span> 아이템 신청하기
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">🚪 로그아웃</button>
    </div>
  </aside>

  <!-- 메인 -->
  <main class="main-content">
    <header class="page-header">
      <h1>아이템 신청하기</h1>
      <div class="header-actions">
        <button class="btn btn-primary" id="btn-new-request" onclick="openNewRequestModal()" style="display:none;">+ 새 아이템 신청</button>
      </div>
    </header>

    <div class="page-body">

      <!-- 상단 안내 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;" id="info-section">
        <div style="background:linear-gradient(135deg,#4F46E5,#7C3AED);border-radius:16px;padding:24px;color:white;">
          <div style="font-size:28px;margin-bottom:10px;">🙋</div>
          <div style="font-size:16px;font-weight:800;margin-bottom:8px;">원하는 공급사 아이템을 신청하세요</div>
          <div style="font-size:13px;opacity:0.85;line-height:1.6;">
            플랫폼에 없는 서비스가 필요하신가요?<br>
            어떤 유형의 공급사가 필요한지 신청하면<br>
            운영사에서 매칭해드립니다.
          </div>
          <button class="btn" style="margin-top:16px;background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.3);" id="btn-new-request-hero" onclick="openNewRequestModal()">
            📝 신청하기
          </button>
        </div>

        <div style="background:white;border:1px solid #E5E7EB;border-radius:16px;padding:24px;">
          <div style="font-size:16px;font-weight:800;margin-bottom:16px;color:#111827;">📋 신청 현황</div>
          <div style="display:flex;flex-direction:column;gap:8px;" id="my-request-summary">
            <div style="font-size:13px;color:#9CA3AF;">로딩 중...</div>
          </div>
        </div>
      </div>

      <!-- 탭 -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all')">전체 신청 목록</button>
        <button class="tab-btn" onclick="switchTab('mine')" id="tab-mine-btn">내 신청</button>
      </div>

      <!-- 필터 -->
      <div class="filter-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="신청 제목, 카테고리 검색" id="req-search" oninput="filterRequests()">
        </div>
        <select class="form-input" style="width:140px;" id="req-status-filter" onchange="filterRequests()">
          <option value="">전체 상태</option>
          <option value="open">모집중</option>
          <option value="matched">매칭됨</option>
          <option value="closed">마감</option>
        </select>
      </div>

      <!-- 목록 -->
      <div id="request-list">
        <div class="loading"><div class="spinner"></div></div>
      </div>

    </div>
  </main>
</div>

<!-- ── 신청 등록 모달 ── -->
<div class="modal-overlay" id="modal-new-request">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3>🙋 아이템 신청하기</h3>
      <button class="modal-close" onclick="closeModal('modal-new-request')">✕</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-info mb-16">
        💡 <div>
          고객에게 소개하고 싶은 서비스/솔루션이 플랫폼에 없을 때 신청해주세요.
          운영사가 검토 후 적합한 공급사를 매칭해드립니다.
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">신청 제목 <span class="required">*</span></label>
        <input type="text" class="form-input" id="req-title" placeholder="예: 중소기업 대상 HR SaaS (3개월 무료체험 제품)">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">카테고리 <span class="required">*</span></label>
          <select class="form-select" id="req-category">
            <option value="">선택</option>
            <option value="영업솔루션">영업솔루션</option>
            <option value="마케팅">마케팅</option>
            <option value="IT·소프트웨어">IT·소프트웨어</option>
            <option value="HR·노무">HR·노무</option>
            <option value="경영컨설팅">경영컨설팅</option>
            <option value="교육·훈련">교육·훈련</option>
            <option value="재무·세무">재무·세무</option>
            <option value="기업복지">기업복지</option>
            <option value="법률·사무">법률·사무</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">타겟 고객 유형</label>
          <input type="text" class="form-input" id="req-target" placeholder="예: 직원 10~100명 중소기업">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">상세 내용 <span class="required">*</span></label>
        <textarea class="form-textarea" id="req-desc" rows="5" placeholder="어떤 종류의 서비스를 원하시나요? 고객의 어떤 문제를 해결할 수 있어야 하나요? 예산 규모나 특이사항이 있다면 함께 적어주세요."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-new-request')">취소</button>
      <button class="btn btn-primary" id="submit-req-btn" onclick="submitRequest()">신청 등록</button>
    </div>
  </div>
</div>

<!-- ── 신청 상세 모달 ── -->
<div class="modal-overlay" id="modal-req-detail">
  <div class="modal">
    <div class="modal-header">
      <h3>신청 상세</h3>
      <button class="modal-close" onclick="closeModal('modal-req-detail')">✕</button>
    </div>
    <div class="modal-body" id="req-detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-req-detail')">닫기</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  let currentUser = null;
  let allRequests = [];
  let currentTab = 'all';

  async function init() {
    currentUser = requireLogin(['connector', 'supplier', 'admin']);
    if (!currentUser) return;

    document.getElementById('sidebar-name').textContent = currentUser.name;
    document.getElementById('sidebar-company').textContent = currentUser.company || currentUser.job_title || '';

    const roleLabels = { admin: '⚙️ 관리자', supplier: '🏢 공급사', connector: '🤝 커넥터' };
    document.getElementById('sidebar-role-badge').textContent = roleLabels[currentUser.role] || '';

    const dashLinks = { admin: 'dashboard-admin.html', supplier: 'dashboard-supplier.html', connector: 'dashboard-connector.html' };
    document.getElementById('nav-dash').href = dashLinks[currentUser.role] || 'login.html';

    // 커넥터만 신청 버튼 표시
    if (currentUser.role === 'connector') {
      document.getElementById('btn-new-request').style.display = 'flex';
    } else {
      document.getElementById('btn-new-request-hero').style.display = 'none';
      document.getElementById('tab-mine-btn').style.display = 'none';
      document.getElementById('info-section').style.gridTemplateColumns = '1fr';
      document.querySelector('#info-section div:first-child').style.display = 'none';
    }

    await loadRequests();
    updateSummary();
    renderRequests();
  }

  async function loadRequests() {
    allRequests = await getAllRows('item_requests');
    allRequests.sort((a, b) => b.created_at - a.created_at);
  }

  function updateSummary() {
    const mine = allRequests.filter(r => r.connector_id === currentUser.id);
    const open = mine.filter(r => r.status === 'open').length;
    const matched = mine.filter(r => r.status === 'matched').length;
    document.getElementById('my-request-summary').innerHTML = `
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid #F3F4F6;">
        <span style="color:#6B7280;">내 신청 건수</span>
        <strong>${mine.length}건</strong>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid #F3F4F6;">
        <span style="color:#6B7280;">모집중</span>
        <strong style="color:#10B981;">${open}건</strong>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 0;">
        <span style="color:#6B7280;">매칭됨</span>
        <strong style="color:#4F46E5;">${matched}건</strong>
      </div>
    `;
  }

  function renderRequests() {
    let list = currentTab === 'mine'
      ? allRequests.filter(r => r.connector_id === currentUser.id)
      : allRequests;

    // 검색 필터
    const q = document.getElementById('req-search').value.toLowerCase();
    const st = document.getElementById('req-status-filter').value;
    if (q) list = list.filter(r => (r.title || '').toLowerCase().includes(q) || (r.category || '').toLowerCase().includes(q));
    if (st) list = list.filter(r => r.status === st);

    const container = document.getElementById('request-list');
    if (list.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🙋</div>
          <p>신청된 아이템이 없습니다</p>
          ${currentUser.role === 'connector' ? `<button class="btn btn-primary" onclick="openNewRequestModal()">첫 신청 등록하기</button>` : ''}
        </div>
      `;
      return;
    }

    container.innerHTML = list.map(req => `
      <div style="background:white;border:1px solid #E5E7EB;border-radius:12px;padding:20px;margin-bottom:12px;cursor:pointer;transition:all 0.15s;"
           onmouseover="this.style.borderColor='#4F46E5'" onmouseout="this.style.borderColor='#E5E7EB'"
           onclick="showDetail('${req.id}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
              ${req.category ? `<span class="badge badge-blue">${req.category}</span>` : ''}
              ${statusBadge(req.status)}
            </div>
            <div style="font-size:15px;font-weight:700;color:#111827;margin-bottom:6px;">${req.title || '-'}</div>
            <div style="font-size:13px;color:#6B7280;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
              ${req.description || '-'}
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-size:12px;color:#9CA3AF;">${req.connector_name || '-'}</div>
            <div style="font-size:11px;color:#D1D5DB;margin-top:4px;">${formatDate(req.created_at)}</div>
          </div>
        </div>
        ${req.admin_memo ? `
        <div style="background:#F0FDF4;border:1px solid #A7F3D0;border-radius:8px;padding:10px 12px;margin-top:12px;font-size:12px;color:#065F46;">
          💬 운영자 메모: ${req.admin_memo}
        </div>` : ''}
      </div>
    `).join('');
  }

  function filterRequests() {
    renderRequests();
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === (tab === 'all' ? 0 : 1));
    });
    renderRequests();
  }

  function openNewRequestModal() {
    document.getElementById('req-title').value = '';
    document.getElementById('req-category').value = '';
    document.getElementById('req-target').value = '';
    document.getElementById('req-desc').value = '';
    openModal('modal-new-request');
  }

  async function submitRequest() {
    const title = document.getElementById('req-title').value.trim();
    const category = document.getElementById('req-category').value;
    const target = document.getElementById('req-target').value.trim();
    const desc = document.getElementById('req-desc').value.trim();

    if (!title || !category || !desc) {
      showToast('필수 항목을 입력해주세요', 'error'); return;
    }

    const btn = document.getElementById('submit-req-btn');
    btn.disabled = true; btn.textContent = '등록 중...';

    try {
      await apiPost('item_requests', {
        connector_id: currentUser.id,
        connector_name: currentUser.name,
        title,
        category,
        target_customer_type: target,
        description: desc,
        status: 'open'
      });
      closeModal('modal-new-request');
      showToast('아이템 신청이 등록되었습니다! 운영자가 검토 후 매칭해드립니다 🎉');
      await loadRequests();
      updateSummary();
      renderRequests();
    } catch {
      showToast('등록 중 오류가 발생했습니다', 'error');
    } finally {
      btn.disabled = false; btn.textContent = '신청 등록';
    }
  }

  function showDetail(id) {
    const req = allRequests.find(r => r.id === id);
    if (!req) return;
    document.getElementById('req-detail-body').innerHTML = `
      <div>
        <div style="display:flex;gap:8px;margin-bottom:12px;">
          ${req.category ? `<span class="badge badge-blue">${req.category}</span>` : ''}
          ${statusBadge(req.status)}
        </div>
        <h3 style="font-size:18px;font-weight:800;margin-bottom:12px;">${req.title}</h3>
        <div style="font-size:13px;color:#6B7280;margin-bottom:16px;">
          신청자: <strong>${req.connector_name || '-'}</strong> | 등록일: ${formatDate(req.created_at)}
        </div>
        <div style="background:#F9FAFB;border-radius:8px;padding:16px;font-size:13px;line-height:1.7;margin-bottom:16px;">
          ${(req.description || '-').replace(/\n/g, '<br>')}
        </div>
        ${req.target_customer_type ? `
        <div style="background:#EEF2FF;border-radius:8px;padding:12px;font-size:13px;margin-bottom:16px;">
          <strong>타겟 고객 유형:</strong> ${req.target_customer_type}
        </div>` : ''}
        ${req.admin_memo ? `
        <div style="background:#ECFDF5;border:1px solid #A7F3D0;border-radius:8px;padding:12px;font-size:13px;">
          <strong style="color:#065F46;">💬 운영자 메모:</strong><br>
          ${req.admin_memo}
        </div>` : ''}
      </div>
    `;
    openModal('modal-req-detail');
  }

  init();
</script>
</body>
</html>
