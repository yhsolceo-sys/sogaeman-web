<script src="js/app-utils.js"></script>
<script>
  let currentUser = null;
  let myItems = [];
  let myLeads = [];
  let editingItem = null;

  async function init() {
    const auth = window.appAuth || {};
    const profile = auth.profile || {};
    const user = auth.user || {};

    currentUser = {
      id: user.id || null,
      email: user.email || '',
      name: profile.full_name || user.email || '공급사',
      company_name: profile.company_name || '',
      role: profile.role || 'supplier'
    };

    const sidebarName = document.getElementById('sidebar-name');
    const sidebarCompany = document.getElementById('sidebar-company');

    if (sidebarName) sidebarName.textContent = currentUser.name;
    if (sidebarCompany) sidebarCompany.textContent = currentUser.company_name || '';

    await Promise.all([
      loadMyItems(),
      loadMyLeads()
    ]);

    if (typeof renderDashboard === 'function') {
      renderDashboard();
    }
  }

  /*
    아래부터 있는 기존 함수들은 그대로 유지하세요.
    예:
    - loadMyItems
    - loadMyLeads
    - renderDashboard
    - renderItems
    - renderLeads
    - openItemModal
    - saveItem
    - editItem
    - toggleItemStatus
    - showTab
    - filterItems
    - filterLeads
    - 기타 공급사 관리용 함수들

    단, 함수 내부에 아래 코드가 남아 있으면 제거하세요:
    - requireLogin(...)
    - Session.get()
    - redirectByRole(...)
    - logout()
    - window.location.href = 'login.html'
  */

  function boot() {
    init().catch((e) => {
      console.error('supplier dashboard init error:', e);
    });
  }

  window.addEventListener('app-auth-ready', boot, { once: true });
  if (window.appAuth) boot();
</script>
<script type="module" src="./js/auth-guard.js"></script>
