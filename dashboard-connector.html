<script src="js/app-utils.js"></script>
<script>
  let currentUser = null;
  let allReferrals = [];
  let allItems = [];

  async function init() {
    const auth = window.appAuth || {};
    const profile = auth.profile || {};
    const user = auth.user || {};

    currentUser = {
      id: user.id || null,
      email: user.email || '',
      name: profile.full_name || user.email || '커넥터',
      company_name: profile.company_name || '',
      role: profile.role || 'connector'
    };

    document.getElementById('sidebar-name').textContent = currentUser.name;
    document.getElementById('sidebar-company').textContent = currentUser.company_name || '';

    await Promise.all([loadReferrals(), loadItems()]);
    renderDashboard();
    await checkMarketplaceRedirect();
  }

  async function loadReferrals() {
    const rows = await getAllRows('referrals');
    allReferrals = (rows || []).filter(r => r.connector_id === currentUser.id);
  }

  async function loadItems() {
    const rows = await getAllRows('items');
    allItems = (rows || []).filter(i => i.status === 'active');

    const sel = document.getElementById('ref-item-id');
    if (!sel) return;

    sel.innerHTML = '<option value="">— 아이템을 선택하세요 —</option>';

    allItems.forEach(item => {
      sel.innerHTML += `
        <option
          value="${item.id}"
          data-title="${item.title || ''}"
          data-company="${item.supplier_name || ''}"
          data-rate="${item.reward_rate || 0}"
          data-amount="${item.reward_amount || 0}">
          ${item.title || '제목 없음'} (${item.supplier_name || '공급사'})
        </option>
      `;
    });
  }

  function renderDashboard() {
    const contracted = allReferrals.filter(r => r.status === 'contracted');
    const inprogress = allReferrals.filter(r => !['contracted', 'failed', 'cancelled'].includes(r.status));
    const paidReward = allReferrals
      .filter(r => r.reward_status === 'paid')
      .reduce((sum, r) => sum + (Number(r.reward_amount) || 0), 0);

    document.getElementById('stat-total').textContent = allReferrals.length;
    document.getElementById('stat-contracted').textContent = contracted.length;
    document.getElementById('stat-inprogress').textContent = inprogress.length;
    document.getElementById('stat-reward').textContent = formatMoney(paidReward);

    const recent = [...allReferrals]
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
      .slice(0, 5);

    const tbody = document.getElementById('recent-referrals-body');

    if (recent.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="6">
            <div class="empty-state">
              <div class="empty-icon">📋</div>
              <p>아직 등록한 소개가 없습니다</p>
              <button class="btn btn-primary" onclick="openNewReferralModal()">첫 소개 요청 등록하기</button>
            </div>
          </td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = recent.map(r => `
      <tr>
        <td><strong>${r.item_title || '-'}</strong></td>
        <td>${r.lead_company || '-'}</td>
        <td>${formatDate(r.created_at)}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${statusBadge(r.reward_status)}</td>
        <td><button class="btn btn-outline btn-sm" onclick="showReferralDetail('${r.id}')">상세</button></td>
      </tr>
    `).join('');
  }

  function renderAllReferrals(filtered) {
    const list = filtered || allReferrals;
    const sorted = [...list].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    const tbody = document.getElementById('all-referrals-body');

    if (sorted.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="9">
            <div class="empty-state">
              <div class="empty-icon">📋</div>
              <p>소개 요청이 없습니다</p>
            </div>
          </td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = sorted.map(r => `
      <tr>
        <td><strong>${r.item_title || '-'}</strong></td>
        <td>${r.supplier_name || '-'}</td>
        <td>${r.lead_company || '-'}</td>
        <td>${formatDate(r.created_at)}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${r.contract_amount ? formatMoney(r.contract_amount) : '-'}</td>
        <td>${r.reward_amount ? formatMoney(r.reward_amount) : '-'}</td>
        <td>${statusBadge(r.reward_status)}</td>
        <td><button class="btn btn-outline btn-sm" onclick="showReferralDetail('${r.id}')">상세</button></td>
      </tr>
    `).join('');
  }

  function renderRewards() {
    const paid = allReferrals
      .filter(r => r.reward_status === 'paid')
      .reduce((sum, r) => sum + (Number(r.reward_amount) || 0), 0);

    const pending = allReferrals
      .filter(r => r.status === 'contracted' && r.reward_status === 'pending')
      .reduce((sum, r) => sum + (Number(r.reward_amount) || 0), 0);

    document.getElementById('reward-paid').textContent = formatMoney(paid);
    document.getElementById('reward-pending').textContent = formatMoney(pending);

    const rewarded = allReferrals.filter(r => r.status === 'contracted' || Number(r.reward_amount) > 0);
    const tbody = document.getElementById('rewards-body');

    if (rewarded.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="6">
            <div class="empty-state">
              <div class="empty-icon">💰</div>
              <p>아직 보상 내역이 없습니다</p>
            </div>
          </td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = rewarded.map(r => `
      <tr>
        <td><strong>${r.item_title || '-'}</strong></td>
        <td>${r.lead_company || '-'}</td>
        <td>${r.contract_amount ? formatMoney(r.contract_amount) : '-'}</td>
        <td style="font-weight:700;color:#4F46E5">${r.reward_amount ? formatMoney(r.reward_amount) : '-'}</td>
        <td>${statusBadge(r.reward_status)}</td>
        <td>${formatDate(r.updated_at)}</td>
      </tr>
    `).join('');
  }

  function filterReferrals() {
    const q = document.getElementById('referral-search').value.toLowerCase();
    const st = document.getElementById('referral-status-filter').value;

    const filtered = allReferrals.filter(r => {
      const matchQ =
        !q ||
        (r.item_title || '').toLowerCase().includes(q) ||
        (r.lead_company || '').toLowerCase().includes(q);

      const matchSt = !st || r.status === st;
      return matchQ && matchSt;
    });

    renderAllReferrals(filtered);
  }

  function showTab(tab) {
    ['dashboard', 'my-referrals', 'my-rewards'].forEach(t => {
      const el = document.getElementById(`tab-${t}`);
      if (el) el.style.display = 'none';
    });

    const activeTab = document.getElementById(`tab-${tab}`);
    if (activeTab) activeTab.style.display = 'block';

    const titles = {
      dashboard: '대시보드',
      'my-referrals': '내 소개 현황',
      'my-rewards': '내 보상 현황'
    };

    document.getElementById('page-title').textContent = titles[tab] || '';

    if (tab === 'my-referrals') renderAllReferrals();
    if (tab === 'my-rewards') renderRewards();
  }

  function onItemSelected() {
    const sel = document.getElementById('ref-item-id');
    const opt = sel.options[sel.selectedIndex];
    const box = document.getElementById('item-info-box');

    if (!sel.value) {
      box.style.display = 'none';
      return;
    }

    document.getElementById('item-info-title').textContent = opt.dataset.title || '';
    document.getElementById('item-info-company').textContent = '공급사: ' + (opt.dataset.company || '');

    const rate = Number(opt.dataset.rate || 0);
    const amount = Number(opt.dataset.amount || 0);

    document.getElementById('item-info-reward').textContent =
      amount > 0
        ? `파트너 보상: ${amount.toLocaleString()}원 (정액)`
        : `파트너 보상: 계약금액의 ${rate}%`;

    box.style.display = 'block';
  }

  function openNewReferralModal() {
    document.getElementById('ref-item-id').value = '';
    document.getElementById('ref-lead-company').value = '';
    document.getElementById('ref-lead-name').value = '';
    document.getElementById('ref-lead-phone').value = '';
    document.getElementById('ref-lead-situation').value = '';
    document.getElementById('ref-consent').checked = false;
    document.getElementById('item-info-box').style.display = 'none';
    openModal('modal-new-referral');
  }

  async function submitReferral() {
    const itemId = document.getElementById('ref-item-id').value;
    const leadCompany = document.getElementById('ref-lead-company').value.trim();
    const leadName = document.getElementById('ref-lead-name').value.trim();
    const leadPhone = document.getElementById('ref-lead-phone').value.trim();
    const leadSituation = document.getElementById('ref-lead-situation').value.trim();
    const consent = document.getElementById('ref-consent').checked;

    if (!itemId) {
      showToast('아이템을 선택해주세요', 'error');
      return;
    }

    if (!leadCompany || !leadName || !leadPhone || !leadSituation) {
      showToast('고객 정보를 모두 입력해주세요', 'error');
      return;
    }

    if (!consent) {
      showToast('고객의 연락 동의 여부를 확인해주세요', 'error');
      return;
    }

    const item = allItems.find(i => String(i.id) === String(itemId));
    if (!item) {
      showToast('아이템 정보를 찾을 수 없습니다', 'error');
      return;
    }

    const btn = document.getElementById('submit-referral-btn');
    btn.disabled = true;
    btn.textContent = '등록 중...';

    try {
      await apiPost('referrals', {
        item_id: item.id,
        item_title: item.title,
        connector_id: currentUser.id,
        connector_name: currentUser.name,
        supplier_id: item.supplier_id,
        supplier_name: item.supplier_name,
        lead_company: leadCompany,
        lead_contact_name: leadName,
        lead_contact_phone: leadPhone,
        lead_situation: leadSituation,
        consent_confirmed: true,
        status: 'submitted',
        reward_status: 'pending',
        contract_amount: 0,
        reward_amount: 0
      });

      closeModal('modal-new-referral');
      showToast('소개 요청이 등록되었습니다! 공급사가 곧 연락드릴 예정입니다 🎉', 'success');

      await loadReferrals();
      renderDashboard();
    } catch (e) {
      console.error(e);
      showToast('등록 중 오류가 발생했습니다', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '소개 요청 등록';
    }
  }

  async function showReferralDetail(id) {
    const r = allReferrals.find(x => String(x.id) === String(id));
    if (!r) return;

    document.getElementById('referral-detail-body').innerHTML = `
      <div style="display:grid;gap:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <strong style="font-size:16px;">${r.item_title || '-'}</strong>
          ${statusBadge(r.status)}
        </div>
        <hr class="divider">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;">
          <div><span style="color:#9CA3AF;">공급사</span><br><strong>${r.supplier_name || '-'}</strong></div>
          <div><span style="color:#9CA3AF;">등록일</span><br><strong>${formatDate(r.created_at)}</strong></div>
          <div><span style="color:#9CA3AF;">고객사</span><br><strong>${r.lead_company || '-'}</strong></div>
          <div><span style="color:#9CA3AF;">담당자</span><br><strong>${r.lead_contact_name || '-'}</strong></div>
          <div><span style="color:#9CA3AF;">연락처</span><br><strong>${r.lead_contact_phone || '-'}</strong></div>
          <div><span style="color:#9CA3AF;">동의 여부</span><br><strong>${r.consent_confirmed ? '✅ 동의 완료' : '❌ 미확인'}</strong></div>
        </div>
        <div style="background:#F9FAFB;border-radius:8px;padding:12px;font-size:13px;">
          <div style="font-weight:700;margin-bottom:6px;color:#374151;">고객 상황</div>
          <div style="color:#4B5563;line-height:1.6;">${r.lead_situation || '-'}</div>
        </div>
        ${r.status === 'contracted' ? `
        <div style="background:#ECFDF5;border:1px solid #A7F3D0;border-radius:8px;padding:12px;font-size:13px;">
          <div style="font-weight:700;color:#065F46;margin-bottom:6px;">💰 보상 정보</div>
          <div>계약금액: <strong>${formatMoney(r.contract_amount)}</strong></div>
          <div>파트너 보상: <strong style="color:#4F46E5;">${formatMoney(r.reward_amount)}</strong></div>
          <div>보상 상태: ${statusBadge(r.reward_status)}</div>
        </div>` : ''}
        ${r.supplier_memo ? `
        <div style="background:#FFF7ED;border-radius:8px;padding:12px;font-size:13px;">
          <div style="font-weight:700;margin-bottom:4px;">공급사 메모</div>
          ${r.supplier_memo}
        </div>` : ''}
      </div>
    `;

    openModal('modal-referral-detail');
  }

  async function checkMarketplaceRedirect() {
    const urlParams = new URLSearchParams(window.location.search);
    const fromMarket = urlParams.get('newReferral');
    const savedItemId = sessionStorage.getItem('openReferralItemId');

    if (fromMarket && savedItemId) {
      sessionStorage.removeItem('openReferralItemId');
      openNewReferralModal();

      setTimeout(() => {
        const sel = document.getElementById('ref-item-id');
        if (sel) {
          sel.value = savedItemId;
          onItemSelected();
        }
      }, 300);
    }
  }

  function boot() {
    init().catch((e) => {
      console.error('connector dashboard init error:', e);
    });
  }

  window.addEventListener('app-auth-ready', boot, { once: true });
  if (window.appAuth) boot();
</script>
<script type="module" src="./js/auth-guard.js"></script>
