<script src="js/app-utils.js"></script>
<script>
  let currentUser = null;
  let allUsers = [];
  let allItems = [];
  let allReferrals = [];
  let allRequests = [];
  let currentSettlementTab = 'pending';

  async function init() {
    const auth = window.appAuth || {};
    const profile = auth.profile || {};
    const user = auth.user || {};

    currentUser = {
      id: user.id || null,
      email: user.email || '',
      name: profile.full_name || user.email || '최고관리자',
      company_name: profile.company_name || '',
      role: profile.role || 'admin'
    };

    const sidebarName = document.getElementById('sidebar-name');
    const sidebarCompany = document.getElementById('sidebar-company');

    if (sidebarName) sidebarName.textContent = currentUser.name;
    if (sidebarCompany) sidebarCompany.textContent = currentUser.company_name || '';

    await Promise.all([
      loadUsers(),
      loadItems(),
      loadReferrals(),
      loadRequests()
    ]);

    if (typeof renderDashboard === 'function') {
      renderDashboard();
    }
  }

  /* 
    아래부터 있는 기존 함수들은 그대로 유지하세요.
    예:
    - loadUsers
    - loadItems
    - loadReferrals
    - loadRequests
    - renderDashboard
    - renderConnectors
    - renderSuppliers
    - renderItemsAdmin
    - renderReferralsAdmin
    - renderSettlements
    - renderItemRequests
    - approveReward
    - markPaid
    - toggleUserStatus
    - toggleItemStatusAdmin
    - switchSettlementTab
    - openReqMemo
    - saveReqMemo
    - filterUsers
    - filterItems
    - filterReferralsAdmin
    - showTab
  */

  function boot() {
    init().catch((e) => {
      console.error('admin dashboard init error:', e);
    });
  }

  window.addEventListener('app-auth-ready', boot, { once: true });
  if (window.appAuth) boot();
</script>
<script type="module" src="./js/auth-guard.js"></script>
